<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.45" stop-color="#1f2a44"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="r1" cx="20%" cy="25%" r="60%">
      <stop offset="0" stop-color="#e11d48" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#e11d48" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="80%" cy="10%" r="55%">
      <stop offset="0" stop-color="#0ea5e9" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r3" cx="70%" cy="90%" r="60%">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#g)"/>
  <rect width="1200" height="600" fill="url(#r1)"/>
  <rect width="1200" height="600" fill="url(#r2)"/>
  <rect width="1200" height="600" fill="url(#r3)"/>

  <!-- subtle travel-ish path -->
  <path d="M80 430 C 260 300, 420 520, 620 380 S 980 420, 1120 250" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="10" stroke-linecap="round"/>
  <path d="M80 430 C 260 300, 420 520, 620 380 S 980 420, 1120 250" fill="none" stroke="#e11d48" stroke-opacity="0.25" stroke-width="4" stroke-linecap="round"/>

  <!-- location pins -->
  <g opacity="0.85">
    <circle cx="170" cy="390" r="10" fill="#fff" fill-opacity="0.35"/>
    <circle cx="170" cy="390" r="5" fill="#fff"/>

    <circle cx="620" cy="380" r="10" fill="#fff" fill-opacity="0.35"/>
    <circle cx="620" cy="380" r="5" fill="#fff"/>

    <circle cx="1030" cy="320" r="10" fill="#fff" fill-opacity="0.35"/>
    <circle cx="1030" cy="320" r="5" fill="#fff"/>
  </g>

  <!-- headline hint -->
  <text x="60" y="120" font-family="system-ui, -apple-system, Segoe UI, Roboto" font-size="44" fill="#fff" opacity="0.92">DreamTrip</text>
  <text x="60" y="170" font-family="system-ui, -apple-system, Segoe UI, Roboto" font-size="18" fill="#fff" opacity="0.7">Your next trip starts here</text>
</svg>
